name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  validate:
    name: Validate & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
      fail-fast: false

    steps:
      - name: 📚 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            package.json

      - name: 📦 Install dependencies
        run: |
          npm ci --legacy-peer-deps
          npm install -g expo-cli eas-cli

      - name: 🔍 Check package-lock.json
        run: |
          if [ ! -f "package-lock.json" ]; then
            echo "❌ package-lock.json not found!"
            exit 1
          fi
          echo "✅ package-lock.json exists"

      - name: 🎨 Run Prettier
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}" || true

      - name: 🔎 Run ESLint
        run: |
          npx eslint src/ --ext .ts,.tsx --max-warnings=0 || true
        continue-on-error: true

      - name: 📝 TypeScript Type Check
        run: |
          npx tsc --noEmit --skipLibCheck || true
        continue-on-error: true

      - name: 🧪 Run Unit Tests
        run: |
          npm test -- --coverage --passWithNoTests || true
        env:
          CI: true

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: 🔨 Build Expo Project
        run: |
          expo export --platform ios,android --output-dir dist || true
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: true

      - name: 📦 Cache node_modules
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            ~/.npm
            .expo
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            ${{ runner.os }}-

      - name: 💾 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-node-${{ matrix.node-version }}
          path: |
            dist/
            coverage/
            package-lock.json
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: 📚 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Run npm audit
        run: |
          npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: 🔐 Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  notification:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [validate, security]
    if: always()
    
    steps:
      - name: 📧 Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: |
            CI/CD Build ${{ job.status }} - ${{ github.repository }}
          to: ${{secrets.NOTIFICATION_EMAIL}}
          from: GitHub Actions
          body: |
            Workflow: ${{ github.workflow }}
            Status: ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Repository: ${{ github.repository }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
